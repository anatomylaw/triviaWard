function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}
function decodeHTML(html) {
  const txt = document.createElement('textarea');
  txt.innerHTML = html;
  return txt.value;
}
function normalizeQuestionKey(prompt, choices) {
  return `${prompt}||${choices.join('|')}`.toUpperCase();
}
function questionLooksUsable(qText) {
  const text = String(qText || '').trim();
  return text.length >= 10 && text.length <= 170;
}
function answerAppearsInQuestion(questionText, answerText) {
  const q = String(questionText || '').toLowerCase();
  const a = String(answerText || '').toLowerCase().trim();
  if (!a || a.length < 5) return false;
  if (q.includes(a)) return true;
  const words = a.split(/[^a-z0-9]+/i).filter(w => w.length >= 5);
  if (words.length >= 2) {
    let hits = 0;
    for (const w of words) if (q.includes(w)) hits += 1;
    if (hits >= Math.max(2, Math.ceil(words.length * 0.75))) return true;
  }
  return false;
}
function inferTopic(questionText, sourceTopic) {
  if (sourceTopic) return String(sourceTopic);
  const t = String(questionText || '').toLowerCase();
  if (t.includes('king') || t.includes('queen') || t.includes('prince') || t.includes('royal')) return 'Royals';
  if (t.includes('soccer') || t.includes('football') || t.includes('goal') || t.includes('fifa') || t.includes('league')) return 'Soccer';
  if (t.includes('triangle') || t.includes('hexagon') || t.includes('geometry') || t.includes('angle')) return 'Geometry';
  if (t.includes('river') || t.includes('capital') || t.includes('continent') || t.includes('ocean')) return 'Geography';
  if (t.includes('god') || t.includes('myth') || t.includes('trojan') || t.includes('zeus')) return 'Mythology';
  if (t.includes('paint') || t.includes('museum') || t.includes('artist') || t.includes('art')) return 'Art';
  if (t.includes('novel') || t.includes('author') || t.includes('book') || t.includes('poem')) return 'Literature';
  if (t.includes('election') || t.includes('parliament') || t.includes('president') || t.includes('prime minister')) return 'Politics';
  if (t.includes('war') || t.includes('empire') || t.includes('revolution') || t.includes('ancient')) return 'History';
  if (t.includes('headline') || t.includes('ceasefire') || t.includes('inflation') || t.includes('tariff')) return 'Current Events';
  return 'Mixed';
}
function inferLevel(questionText, sourceDifficulty) {
  if (sourceDifficulty) return String(sourceDifficulty).toLowerCase();
  const len = String(questionText || '').length;
  if (len < 55) return 'easy';
  if (len < 100) return 'medium';
  return 'hard';
}
function outlineText(text, x, y, fill = '#fff', size = 26, align = 'left') {
  ctx.font = `${size}px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
  ctx.textAlign = align;
  ctx.lineWidth = Math.max(2, size * 0.06);
  ctx.strokeStyle = 'rgba(0,0,0,0.45)';
  ctx.strokeText(text, x, y);
  ctx.fillStyle = fill;
  ctx.fillText(text, x, y);
}
function wrappedText(text, x, y, maxWidth, lineHeight, fill, size, align = 'left') {
  ctx.font = `${size}px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
  ctx.textAlign = align;
  const words = String(text).split(' ');
  let line = '';
  const lines = [];
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  lines.forEach((ln, i) => outlineText(ln, x, y + i * lineHeight, fill, size, align));
}

function prepareQuestion(question) {
  const answerText = question.choices[question.answer];
  if (answerAppearsInQuestion(question.q, answerText)) return null;
  const entries = question.choices.map((text, i) => ({ text, correct: i === question.answer }));
  const shuffled = shuffleArray(entries);
  return {
    prompt: question.q,
    choices: shuffled,
    key: normalizeQuestionKey(question.q, question.choices),
    answerText,
    source: question.source || 'Mixed Source',
    topic: inferTopic(question.q, question.topic),
    level: inferLevel(question.q, question.level)
  };
}
function buildBalancedQuestionPool(questions) {
  const groups = new Map();
  for (const q of questions) {
    const bucket = `${q.source || 'Unknown'} | ${inferTopic(q.q, q.topic)} | ${inferLevel(q.q, q.level)}`;
    if (!groups.has(bucket)) groups.set(bucket, []);
    groups.get(bucket).push(q);
  }
  const keys = shuffleArray(Array.from(groups.keys()));
  for (const key of keys) groups.set(key, shuffleArray(groups.get(key)));
  const output = [];
  let added = true;
  while (added) {
    added = false;
    for (const key of keys) {
      const bucket = groups.get(key);
      if (bucket && bucket.length) {
        output.push(bucket.pop());
        added = true;
      }
    }
  }
  return output;
}

async function fetchJson(url) {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), CONFIG.requestTimeoutMs);
    const res = await fetch(url, { cache:'no-store', signal: controller.signal });
    clearTimeout(timer);
    return res.ok ? await res.json() : null;
  } catch { return null; }
}
async function fetchGitHubTrivia() {
  const isPhone = canvas.clientWidth <= 430;
  const results = await Promise.all(githubSources.map(fetchJson));
  const questions = [];
  for (const data of results) {
    const arr = Array.isArray(data) ? data : (data && (data.questions || data.results || data.data) ? (data.questions || data.results || data.data) : []);
    for (const item of arr) {
      try {
        const qText = String(item.question || item.q || item.prompt || '').trim();
        const correct = String(item.answer || item.correct_answer || item.correct || '').trim();
        let incorrect = item.incorrect_answers || item.options || item.choices || item.answers || [];
        if (!Array.isArray(incorrect)) incorrect = [];
        incorrect = incorrect.map(x => String(x).trim()).filter(Boolean).filter(x => x !== correct);
        if (!questionLooksUsable(qText) || !correct || incorrect.length < 3) continue;
        const choices = shuffleArray([correct, ...incorrect.slice(0, 3)]);
        questions.push({ q:qText.toUpperCase(), choices, answer:choices.indexOf(correct), source:'GitHub Trivia DB', topic:item.category || item.topic || 'Mixed', level:item.difficulty || 'medium' });
      } catch {}
    }
  }
  return shuffleArray(questions).slice(0, isPhone ? 60 : 120);
}
async function fetchOpenTDBCategory(category, amount = 6) {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), CONFIG.requestTimeoutMs);
    const url = `https://opentdb.com/api.php?amount=${amount}&category=${category}&type=multiple`;
    const res = await fetch(url, { cache:'no-store', signal: controller.signal });
    clearTimeout(timer);
    if (!res.ok) return [];
    const data = await res.json();
    if (!Array.isArray(data.results)) return [];
    return data.results.map(item => {
      const correct = decodeHTML(item.correct_answer);
      const incorrect = item.incorrect_answers.map(decodeHTML);
      const choices = shuffleArray([correct, ...incorrect]);
      return { q:decodeHTML(item.question).toUpperCase(), choices, answer:choices.indexOf(correct), source:'Open Trivia DB', topic:item.category || 'Mixed', level:item.difficulty || 'medium' };
    }).filter(q => questionLooksUsable(q.q));
  } catch { return []; }
}
async function fetchOpenTDBBatch() {
  const isPhone = canvas.clientWidth <= 430;
  const picks = shuffleArray(allowedCategories).slice(0, isPhone ? 4 : 6);
  const results = await Promise.all(picks.map(cat => fetchOpenTDBCategory(cat, isPhone ? 4 : 6)));
  return results.flat();
}
async function fetchTriviaApi() {
  try {
    const isPhone = canvas.clientWidth <= 430;
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), CONFIG.requestTimeoutMs);
    const res = await fetch(`https://the-trivia-api.com/v2/questions?limit=${isPhone ? 10 : 18}`, { cache:'no-store', signal: controller.signal });
    clearTimeout(timer);
    if (!res.ok) return [];
    const data = await res.json();
    if (!Array.isArray(data)) return [];
    return data.map(item => {
      const correct = String(item.correctAnswer || '').trim();
      const incorrect = Array.isArray(item.incorrectAnswers) ? item.incorrectAnswers.map(x => String(x).trim()) : [];
      const choices = shuffleArray([correct, ...incorrect.slice(0, 3)]);
      return { q:String((item.question && (item.question.text || item.question)) || '').toUpperCase(), choices, answer:choices.indexOf(correct), source:'The Trivia API', topic:item.category || 'Mixed', level:item.difficulty || 'medium' };
    }).filter(q => questionLooksUsable(q.q) && q.answer >= 0 && q.choices.length >= 4);
  } catch { return []; }
}
async function fetchWikipediaBatch() {
  const isPhone = canvas.clientWidth <= 430;
  const picked = shuffleArray(wikiPages).slice(0, isPhone ? 4 : 6);
  const questions = [];
  await Promise.all(picked.map(async page => {
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), CONFIG.requestTimeoutMs);
      const res = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(page), { cache:'no-store', signal: controller.signal });
      clearTimeout(timer);
      if (!res.ok) return;
      const data = await res.json();
      if (!data.title || !data.extract) return;
      const correct = decodeHTML(data.title).replaceAll('_', ' ');
      const firstSentence = decodeHTML(data.extract).split('. ')[0].trim();
      if (!questionLooksUsable(firstSentence)) return;
      if (firstSentence.toUpperCase().includes(correct.toUpperCase())) return;
      const distractors = shuffleArray(wikiPages.filter(p => p !== page).map(p => p.replaceAll('_', ' '))).slice(0, 3);
      const choices = shuffleArray([correct, ...distractors]);
      questions.push({ q:firstSentence.toUpperCase() + '?', choices, answer:choices.indexOf(correct), source:'Wikipedia', topic:page.replaceAll('_', ' '), level:'medium' });
    } catch {}
  }));
  return questions;
}

async function refreshQuestionPool() {
  if (state.loadingQuestions) return;
  const cacheFresh = Date.now() - state.cacheTime < 5 * 60 * 1000;
  if (cacheFresh && state.cachedPool.length) {
    state.questionPool = buildBalancedQuestionPool(state.cachedPool.filter(q => {
      const key = normalizeQuestionKey(q.q, q.choices);
      return !state.usedQuestions.has(key) && !state.sessionUsedQuestions.has(key) && !state.longSessionUsedQuestions.has(key);
    }));
    state.sourceLabel = state.questionPool.length ? 'DATABASE-HEAVY MIX' : 'LIVE SOURCES UNAVAILABLE';
    if (!state.questionPool.length) {
      state.feedback = 'NO LIVE QUESTIONS AVAILABLE. TAP TO TRY AGAIN.';
      state.feedbackType = 'bad';
    }
    return;
  }

  state.loadingQuestions = true;
  state.feedback = 'FETCHING LIVE QUESTIONS...';
  state.feedbackType = 'neutral';
  try {
    const [githubBatch, otdbBatch, triviaApiBatch, wikiBatch, currentBatch] = await Promise.allSettled([
      fetchGitHubTrivia(), fetchOpenTDBBatch(), fetchTriviaApi(), fetchWikipediaBatch(), fetchWikiCurrentEventsBatch()
    ]);
    const combined = [...LOCAL_QUESTION_PACK, ...LOCAL_QUESTION_PACK.slice(0, 6)];
    if (githubBatch.status === 'fulfilled') combined.push(...githubBatch.value, ...githubBatch.value.slice(0, 10));
    if (otdbBatch.status === 'fulfilled') combined.push(...otdbBatch.value, ...otdbBatch.value.slice(0, 10));
    if (triviaApiBatch.status === 'fulfilled') combined.push(...triviaApiBatch.value, ...triviaApiBatch.value.slice(0, 8));
    if (wikiBatch.status === 'fulfilled') combined.push(...wikiBatch.value.slice(0, 6));
    if (currentBatch.status === 'fulfilled') combined.push(...currentBatch.value.slice(0, 4));

    const deduped = [];
    const seen = new Set();
    for (const q of combined) {
      if (!q || !q.q || !Array.isArray(q.choices) || q.choices.length < 4) continue;
      const key = normalizeQuestionKey(q.q, q.choices);
      if (!seen.has(key)) {
        seen.add(key);
        deduped.push(q);
      }
    }
    state.cachedPool = deduped.slice();
    state.cacheTime = Date.now();
    state.questionPool = buildBalancedQuestionPool(deduped.filter(q => {
      const key = normalizeQuestionKey(q.q, q.choices);
      return !state.usedQuestions.has(key) && !state.sessionUsedQuestions.has(key) && !state.longSessionUsedQuestions.has(key);
    }));
    state.sourceLabel = state.questionPool.length ? 'DATABASE-HEAVY MIX' : 'LIVE SOURCES UNAVAILABLE';
    if (!state.questionPool.length) {
      state.feedback = 'NO LIVE QUESTIONS AVAILABLE. TAP TO TRY AGAIN.';
      state.feedbackType = 'bad';
    }
  } catch (e) {
    console.error(e);
    state.questionPool = [];
    state.sourceLabel = 'LIVE SOURCES UNAVAILABLE';
    state.feedback = 'NO LIVE QUESTIONS AVAILABLE. TAP TO TRY AGAIN.';
    state.feedbackType = 'bad';
  }
  state.loadingQuestions = false;
}

async function nextQuestion() {
  if (state.loadingQuestions) return;
  state.transition = false;
  if (state.questionPool.length === 0) await refreshQuestionPool();
  if (state.questionPool.length === 0) {
    state.currentQuestion = null;
    state.feedback = 'NO LIVE QUESTIONS AVAILABLE. TAP TO TRY AGAIN.';
    state.feedbackType = 'bad';
    return;
  }

  let picked = null;
  let safety = 0;
  while (!picked && safety < 400) {
    safety += 1;
    if (state.questionPool.length === 0) break;
    const idx = Math.floor(Math.random() * state.questionPool.length);
    const candidate = state.questionPool.splice(idx, 1)[0];
    if (!candidate || !candidate.q || !Array.isArray(candidate.choices)) continue;
    const key = normalizeQuestionKey(candidate.q, candidate.choices);
    if (state.usedQuestions.has(key) || state.sessionUsedQuestions.has(key) || state.longSessionUsedQuestions.has(key)) continue;
    const prepared = prepareQuestion(candidate);
    if (!prepared) continue;
    picked = prepared;
  }
  if (!picked) {
    state.currentQuestion = null;
    state.feedback = 'NO VALID LIVE QUESTIONS AVAILABLE. TAP TO TRY AGAIN.';
    state.feedbackType = 'bad';
    return;
  }
  state.usedQuestions.add(picked.key);
  state.sessionUsedQuestions.add(picked.key);
  state.longSessionUsedQuestions.add(picked.key);
  state.currentQuestion = picked;
  state.correctAnswerText = picked.answerText;
  state.currentSource = picked.source;
  state.answered = false;
  state.feedback = '';
  state.feedbackType = 'neutral';
}

async function resetGame() {
  if (state.pendingNextTimeout) {
    clearTimeout(state.pendingNextTimeout);
    state.pendingNextTimeout = null;
  }
  state.roundId += 1;
  state.score = 0;
  state.streak = 0;
  state.wrongCount = 0;
  state.currentQuestion = null;
  state.correctAnswerText = '';
  state.transition = false;
  state.fatalError = '';
  state.feedback = 'LOADING LIVE QUESTIONS...';
  state.feedbackType = 'neutral';
  state.answered = false;
  state.gameOver = false;
  state.win = false;
  state.shake = 0;
  state.tick = 0;
  state.clickableAnswers = [];
  state.questionPool = [];
  state.usedQuestions.clear();
  state.sessionUsedQuestions.clear();
  state.gamesPlayed += 1;
  if (state.gamesPlayed >= 20) {
    state.longSessionUsedQuestions.clear();
    state.gamesPlayed = 0;
  }
  state.loadingQuestions = false;
  state.sourceLabel = 'DATABASE-HEAVY MIX';
  state.currentSource = '';
  state.stats = {};
  for (const s of statDefs) state.stats[s.key] = s.value;
  await refreshQuestionPool();
  await nextQuestion();
}

function applyOutcome(correct) {
  const s = state.stats;
  if (correct) {
    state.streak += 1;
    s.oxygen = clamp(s.oxygen + (4 + Math.random() * 3), 60, 100);
    s.pressure = clamp(s.pressure + (s.pressure > 120 ? -8 : 6), 70, 170);
    s.temp = clamp(s.temp + (s.temp > 98.6 ? -0.8 : 0.4), 94, 106);
    s.pulse = clamp(s.pulse + (s.pulse > 72 ? -9 : 5), 35, 170);
    state.score += 100;
    state.feedback = 'TRUE. CORRECT ANSWER: ' + state.correctAnswerText;
    state.feedbackType = 'good';
    if (state.streak >= 10) {
      state.gameOver = true;
      state.win = true;
      state.feedback = 'THE PATIENT STABILIZED.';
      return;
    }
  } else {
    state.streak = 0;
    state.wrongCount += 1;
    s.oxygen = clamp(s.oxygen - (5 + Math.random() * 4), 60, 100);
    s.pressure = clamp(s.pressure + (8 + Math.random() * 10), 70, 170);
    s.temp = clamp(s.temp + (0.5 + Math.random() * 0.8), 94, 106);
    s.pulse = clamp(s.pulse + (8 + Math.random() * 9), 35, 170);
    state.feedback = 'FALSE. CORRECT ANSWER: ' + state.correctAnswerText;
    state.feedbackType = 'bad';
    state.shake = 0.45;
    try {
      if (typeof navigator !== 'undefined' && typeof navigator.vibrate === 'function') {
        navigator.vibrate([90, 40, 120]);
      }
    } catch {}
    if (state.wrongCount >= 10) {
      state.gameOver = true;
      state.win = false;
      state.feedback = 'CODE RED — CALL A NURSE IMMEDIATELY.';
      return;
    }
  }
  state.answered = true;
  state.transition = true;
}
function handleAnswer(index) {
  if (state.gameOver || state.answered || !state.currentQuestion || state.loadingQuestions) return;
  const choice = state.currentQuestion.choices[index];
  if (!choice || typeof choice.correct !== 'boolean') return;
  const correctChoice = state.currentQuestion.choices.find(c => c && c.correct === true);
  state.correctAnswerText = correctChoice && correctChoice.text ? correctChoice.text : (state.correctAnswerText || 'UNKNOWN');
  applyOutcome(choice.correct);
}


window.addEventListener('error', (event) => {
  state.fatalError = event && event.message ? event.message : 'UNKNOWN ERROR';
  console.error(event);
});
window.addEventListener('unhandledrejection', (event) => {
  state.fatalError = event && event.reason ? String(event.reason) : 'PROMISE ERROR';
  console.error(event);
});
function handlePointer(x, y) {
  if (state.gameOver || state.fatalError) {
    resetGame();
    return;
  }
  if (state.loadingQuestions) return;
  if (state.transition && state.answered) {
    nextQuestion();
    return;
  }
  for (const a of state.clickableAnswers) {
    if (x >= a.x && x <= a.x + a.w && y >= a.y && y <= a.y + a.h) {
      handleAnswer(a.index);
      break;
    }
  }
}
canvas.addEventListener('pointerdown', e => {
  const rect = canvas.getBoundingClientRect();
  handlePointer(e.clientX - rect.left, e.clientY - rect.top);
});

function drawBed(x, y, scale = 1, occupied = true) {
  const w = 180 * scale, h = 40 * scale;
  ctx.fillStyle = '#d7dce2';
  ctx.fillRect(x - w / 2, y - h / 2, w, h);
  ctx.fillStyle = '#91a5b6';
  ctx.fillRect(x - w / 2 + 12 * scale, y - h / 2 + 6 * scale, w - 24 * scale, h - 12 * scale);
  if (occupied) {
    ctx.fillStyle = '#748faa';
    roundRect(ctx, x - 48 * scale, y - 12 * scale, 104 * scale, 30 * scale, 15 * scale);
    ctx.fill();
    ctx.fillStyle = '#d6b18f';
    ctx.beginPath();
    ctx.arc(x - 46 * scale, y + 2 * scale, 16 * scale, 0, Math.PI * 2);
    ctx.fill();
  }
}
function drawIV(x, y, size = 1) {
  ctx.strokeStyle = '#141414';
  ctx.lineWidth = 5 * size;
  ctx.beginPath();
  ctx.moveTo(x, y - 50 * size);
  ctx.lineTo(x, y + 45 * size);
  ctx.moveTo(x - 22 * size, y - 46 * size);
  ctx.lineTo(x + 22 * size, y - 46 * size);
  ctx.stroke();
  ctx.fillStyle = '#f0f0ea';
  ctx.fillRect(x - 10 * size, y - 90 * size, 20 * size, 34 * size);
  ctx.fillStyle = '#b91f1f';
  ctx.fillRect(x - 7 * size, y - 76 * size, 14 * size, 18 * size);
}
function drawFallbackBackground() {
  const vw = canvas.clientWidth, vh = canvas.clientHeight, isPhone = vw <= 430;
  const g = ctx.createLinearGradient(0, 0, 0, vh);
  g.addColorStop(0, '#2b2e31'); g.addColorStop(0.58, '#36393d'); g.addColorStop(1, '#1a1a1a');
  ctx.fillStyle = g; ctx.fillRect(0, 0, vw, vh);
  const bedCols = isPhone ? 4 : 6;
  for (let row = 0; row < 2; row++) {
    for (let i = 0; i < bedCols; i++) drawBed((i + 0.5) * vw / bedCols, vh * (0.58 + row * 0.11), isPhone ? 0.5 : 0.62, (i + row) % 2 === 0);
  }
  const ivs = isPhone ? 2 : 4;
  for (let i = 0; i < ivs; i++) drawIV((i + 0.5) * vw / ivs, vh * 0.54 + Math.sin(state.tick * 1.8 + i) * 6, isPhone ? 0.68 : 0.82);
}
function drawBackground() {
  const vw = canvas.clientWidth, vh = canvas.clientHeight;
  if (bgLoaded) {
    ctx.drawImage(bgImg, 0, 0, vw, vh);
    ctx.fillStyle = 'rgba(16,16,16,0.22)';
    ctx.fillRect(0, 0, vw, vh);
  } else drawFallbackBackground();
}

function getQuestionMetrics(isPhone, panelWidth) {
  const prompt = state.currentQuestion ? state.currentQuestion.prompt : (state.loadingQuestions ? 'LOADING...' : '');
  const cacheKey = [isPhone ? 'p' : 'd', Math.round(panelWidth), prompt].join('|');
  if (layoutCache.metricsKey === cacheKey && layoutCache.metrics) return layoutCache.metrics;

  const qPad = isPhone ? 22 : 36;
  const qFont = isPhone ? 16 : 21;
  const qLine = isPhone ? 18 : 22;
  const outerPad = isPhone ? 12 : 16;
  const topBoxMinH = isPhone ? 88 : 100;
  const maxTextWidth = panelWidth - qPad * 2;

  ctx.font = `${qFont}px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
  const words = String(prompt).split(' ');
  let line = '';
  let lines = 0;
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxTextWidth && line) {
      lines += 1;
      line = word;
    } else {
      line = test;
    }
  }
  if (line) lines += 1;

  const textBlockH = Math.max(qLine, lines * qLine);
  const topBoxH = Math.max(topBoxMinH, outerPad + 14 + textBlockH + 18);
  const metrics = { qPad, qFont, qLine, outerPad, topBoxH, lines };
  layoutCache.metricsKey = cacheKey;
  layoutCache.metrics = metrics;
  return metrics;
}

function getLayout() {
  const isPhone = canvas.clientWidth <= 430;
  const panelWidth = isPhone ? canvas.clientWidth - 20 : Math.min(760, canvas.clientWidth * 0.62);
  const topMargin = isPhone ? 10 : Math.max(12, canvas.clientHeight * 0.035);
  const gap = isPhone ? 10 : 12;
  const bottomSafe = isPhone ? 14 : 16;
  const available = Math.max(300, canvas.clientHeight - topMargin - bottomSafe - gap);

  const metrics = getQuestionMetrics(isPhone, panelWidth);
  const { outerPad, topBoxH } = metrics;
  const boxH = isPhone ? 50 : 54;
  const minGap = isPhone ? 6 : 8;

  const minQuestion = outerPad * 2 + topBoxH + boxH * 4 + minGap * 5;
  const minStats = isPhone ? 150 : 170;

  let questionHeight = Math.max(minQuestion, Math.round(available * (isPhone ? 0.54 : 0.52)));
  let statsHeight = Math.max(minStats, available - questionHeight);

  if (questionHeight + statsHeight > available) {
    const overflow = questionHeight + statsHeight - available;
    if (questionHeight - overflow >= minQuestion) {
      questionHeight -= overflow;
    } else {
      statsHeight = Math.max(minStats, available - minQuestion);
      questionHeight = available - statsHeight;
    }
  }

  const x = (canvas.clientWidth - panelWidth) / 2;
  const qY = topMargin;
  const sY = qY + questionHeight + gap;

  const cacheKey = [canvas.clientWidth, canvas.clientHeight, isPhone ? 'p' : 'd', questionHeight, statsHeight, metrics.topBoxH, state.transition ? 1 : 0].join('|');
  if (layoutCache.layoutKey === cacheKey && layoutCache.layout) return layoutCache.layout;

  const layout = {
    isPhone,
    w: panelWidth,
    x,
    qY,
    qH: questionHeight,
    sY,
    sH: statsHeight,
    gap,
    metrics: { ...metrics, boxH, minGap }
  };
  layoutCache.layoutKey = cacheKey;
  layoutCache.layout = layout;
  return layout;
}

function drawQuestionPanel() {
  if (state.transition) return;
  const layout = getLayout();
  const { w, x, qY: y, qH: h, metrics } = layout;
  const { outerPad, topBoxH, boxH, minGap, qPad, qFont, qLine } = metrics;
  const answerFont = layout.isPhone ? 15 : 17;
  const answerLine = layout.isPhone ? 14 : 16;

  const totalBoxesHeight = boxH * 4;
  const totalGapSpace = h - outerPad * 2 - topBoxH - totalBoxesHeight;
  let g = totalGapSpace / 5;
  if (!isFinite(g) || g < minGap) g = minGap;

  const answersTop = y + outerPad + topBoxH + g;

  ctx.fillStyle = 'rgba(116,112,102,0.94)';
  roundRect(ctx, x, y, w, h, 24);
  ctx.fill();
  ctx.strokeStyle = '#121212';
  ctx.lineWidth = 7;
  ctx.stroke();

  ctx.fillStyle = '#252923';
  roundRect(ctx, x + outerPad, y + outerPad, w - outerPad * 2, topBoxH, 16);
  ctx.fill();
  ctx.stroke();

  const questionTextY = y + outerPad + 26;
  if (state.loadingQuestions) {
    wrappedText('LOADING...', x + qPad, questionTextY, w - qPad * 2, qLine, '#f2e6b5', qFont, 'left');
  } else if (state.currentQuestion) {
    wrappedText(state.currentQuestion.prompt, x + qPad, questionTextY, w - qPad * 2, qLine, '#f2e6b5', qFont, 'left');
  }

  state.clickableAnswers = [];
  const choices = state.currentQuestion ? state.currentQuestion.choices : [];
  for (let i = 0; i < 4; i++) {
    const ay = answersTop + i * (boxH + g);
    ctx.fillStyle = 'rgba(43,47,41,0.96)';
    roundRect(ctx, x + outerPad, ay, w - outerPad * 2, boxH, 14);
    ctx.fill();
    ctx.strokeStyle = '#0d0d0d';
    ctx.lineWidth = 3;
    ctx.stroke();

    const answerText = choices[i] && choices[i].text ? choices[i].text : '...';
    ctx.fillStyle = 'rgba(22,24,21,0.72)';
    roundRect(ctx, x + outerPad + 6, ay + 6, w - outerPad * 2 - 12, boxH - 12, 10);
    ctx.fill();
    wrappedText(answerText, x + w / 2, ay + 22, w - qPad * 2, answerLine, '#fff6d8', answerFont, 'center');

    if (choices[i] && typeof choices[i].correct === 'boolean') {
      state.clickableAnswers.push({ x: x + outerPad, y: ay, w: w - outerPad * 2, h: boxH, index: i });
    }
  }
}

function barFillRatio(def, v) { return (v - def.min) / (def.max - def.min); }
function statDisplay(def, v) {
  if (def.key === 'pressure') return `${Math.round(v)}/85`;
  if (def.key === 'temp') return `${v.toFixed(1)}${def.unit}`;
  return `${Math.round(v)}${def.unit}`;
}
function drawStatsPanel() {
  if (state.transition) return;
  const layout = getLayout();
  const { isPhone, w, x, sY: y, sH: h } = layout;
  const outerPad = isPhone ? 12 : 16;

  ctx.fillStyle = 'rgba(30,30,27,0.95)';
  roundRect(ctx, x, y, w, h, 18);
  ctx.fill();
  ctx.strokeStyle = '#070707';
  ctx.lineWidth = 5;
  ctx.stroke();

  outlineText('PATIENT STATS', x + outerPad, y + 28, '#f4df9a', isPhone ? 18 : 27, 'left');
  outlineText('SCORE: ' + state.score, x + w - outerPad, y + 28, '#f4d265', isPhone ? 14 : 20, 'right');
  outlineText('WRONG: ' + state.wrongCount + '/10', x + w - outerPad, y + 48, '#ff9d9d', isPhone ? 12 : 15, 'right');

  const headerH = isPhone ? 62 : 88;
  const contentTop = y + headerH;
  const contentBottom = y + h - (isPhone ? 10 : 12);
  const rowGap = (contentBottom - contentTop) / 4;

  const titleFont = isPhone ? 13 : 18;
  const valueFont = isPhone ? 14 : 18;
  const titleLine = isPhone ? 12 : 16;
  const barHeight = isPhone ? 18 : 22;

  statDefs.forEach((def, i) => {
    const rowY = contentTop + i * rowGap;
    const val = state.stats[def.key];
    const ratio = clamp(barFillRatio(def, val), 0, 1);

    const labelX = x + outerPad;
    const labelW = isPhone ? 160 : 240;
    wrappedText(def.label, labelX, rowY + 2, labelW, titleLine, '#f3e9bc', titleFont, 'left');

    const valueText = statDisplay(def, val);
    ctx.font = `${valueFont}px Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif`;
    const valueW = Math.ceil(ctx.measureText(valueText).width) + 14;

    // align bars directly under titles
    const barX = labelX;
    const barRight = x + w - outerPad - valueW;
    const barW = Math.max(isPhone ? 120 : 260, barRight - barX);
    const barY = rowY + (isPhone ? 20 : 24);

    ctx.fillStyle = '#101511';
    ctx.fillRect(barX, barY, barW, barHeight);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    ctx.strokeRect(barX, barY, barW, barHeight);
    ctx.fillStyle = def.color;
    ctx.fillRect(barX, barY, barW * ratio, barHeight);

    outlineText(valueText, barRight + valueW - 2, barY + barHeight - 2, '#f7efc7', valueFont + 2, 'right');
  });
}
function drawMonitor() { /* hidden to avoid overlap */ }
function drawOverlay() {
  if (!state.gameOver) return;
  const vw = canvas.clientWidth, vh = canvas.clientHeight;
  ctx.fillStyle = 'rgba(0,0,0,0.64)'; ctx.fillRect(0, 0, vw, vh);
  const title = state.win ? 'NIGHT SHIFT COMPLETE' : 'CODE RED';
  const subtitle = state.win ? 'YOU KEPT THE VITALS ABOVE THE EDGE.' : 'CALL A NURSE IMMEDIATELY.';
  const color = state.win ? '#8fe66f' : '#ff6262';
  outlineText(title, vw / 2, vh / 2 - 30, color, 48, 'center');
  outlineText(subtitle, vw / 2, vh / 2 + 18, '#fff1bf', 22, 'center');
  outlineText(`FINAL SCORE ${state.score}`, vw / 2, vh / 2 + 58, '#fff', 26, 'center');
  outlineText('TAP TO REVIVE PATIENT', vw / 2, vh / 2 + 96, '#f7eab8', 20, 'center');
}

function update(dt) { state.tick += dt; state.shake = Math.max(0, state.shake - dt); }
function render() {
  const vw = canvas.clientWidth, vh = canvas.clientHeight;
  try {
    const shakeX = state.shake > 0 ? (Math.random() - 0.5) * 14 * state.shake : 0;
    const shakeY = state.shake > 0 ? (Math.random() - 0.5) * 12 * state.shake : 0;
    ctx.clearRect(0, 0, vw, vh);
    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawBackground();
    if (state.transition) {
      const isPhone = canvas.clientWidth <= 430;
      const msgSize = isPhone ? 18 : 26;
      const subSize = isPhone ? 15 : 20;

      // center block vertically
      const centerY = vh * 0.5;

      // ANSWER TEXT (centered)
      wrappedText(
        state.feedback,
        vw * 0.5,
        centerY - 20,
        vw * 0.7,
        26,
        state.feedbackType === 'good' ? '#93e070' : '#ff7979',
        msgSize,
        'center'
      );

      // CLICK TEXT (closer + centered)
      wrappedText(
        'CLICK TO LOAD NEXT QUESTION',
        vw * 0.5,
        centerY + 40,
        vw * 0.7,
        22,
        '#fff6d8',
        subSize,
        'center'
      );
    } else {
      drawQuestionPanel();
      drawStatsPanel();
    }
    ctx.restore();
    drawOverlay();
    if (bgFailed) outlineText('BACKGROUND IMAGE NOT FOUND', 20, 34, '#ff8a8a', 18, 'left');
    if (state.fatalError) outlineText('ERROR MODE ACTIVE', 20, vh - 20, '#ff9d9d', 16, 'left');
  } catch (err) {
    console.error(err);
    state.fatalError = String(err && err.message ? err.message : err);
    ctx.clearRect(0, 0, vw, vh);
    drawBackground();
    wrappedText('GAME ERROR', vw * 0.1, vh * 0.45, vw * 0.8, 28, '#ff7979', 28, 'left');
    wrappedText('TAP TO TRY AGAIN', vw * 0.1, vh * 0.45 + 42, vw * 0.8, 22, '#fff6d8', 18, 'left');
    wrappedText(state.fatalError || 'UNKNOWN ERROR', vw * 0.1, vh * 0.45 + 74, vw * 0.8, 18, '#ffb3b3', 14, 'left');
  }
}
function frame(ts) {
  const dt = Math.min(0.033, ((ts - (frame.last || ts)) / 1000) || 0.016);
  frame.last = ts;
  update(dt);
  render();
  requestAnimationFrame(frame);
}

async function boot() {
  requestAnimationFrame(frame);
  try { await resetGame(); }
  catch (e) {
    console.error(e);
    state.currentQuestion = null;
    state.feedback = 'NO LIVE QUESTIONS AVAILABLE. TAP TO TRY AGAIN.';
    state.feedbackType = 'bad';
    state.loadingQuestions = false;
  }
}
boot();
</script>
</body>
